name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
      digest:
        description: "Container image digest"
        required: true

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: main

      - name: Validate inputs and verify digest
        env:
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ inputs.digest }}
        shell: bash
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${VERSION} (expected vX.Y.Z)"
            exit 1
          fi

          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${VERSION} already exists"
            exit 1
          fi

          ACTUAL_DIGEST=$(grep -oP 'sha256:[a-f0-9]+' action.yaml | head -1)
          if [ "${ACTUAL_DIGEST}" != "${DIGEST}" ]; then
            echo "::error::Digest mismatch! action.yaml has ${ACTUAL_DIGEST} but expected ${DIGEST}. Was the digest update PR merged?"
            exit 1
          fi

          echo "Releasing ${VERSION} (digest verified: ${DIGEST})"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ inputs.digest }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_SHA=$(git rev-parse HEAD)

          git tag "${VERSION}"
          git push origin "${VERSION}"

          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "${VERSION}" \
            --notes "Container digest: \`${DIGEST}\`

          **Usage (pin by commit SHA):**
          \`\`\`yaml
          - uses: tinfoilsh/pri-build-action@${COMMIT_SHA}  # ${VERSION}
          \`\`\`"
