name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
      digest:
        description: "Container image digest"
        required: true

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: main

      - name: Validate inputs and verify digest
        env:
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ inputs.digest }}
        shell: bash
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${VERSION} (expected vX.Y.Z)"
            exit 1
          fi

          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${VERSION} already exists"
            exit 1
          fi

          ACTUAL_DIGEST=$(grep -oP 'measure-image-action@\Ksha256:[a-f0-9]+' action.yaml)
          if [ "${ACTUAL_DIGEST}" != "${DIGEST}" ]; then
            echo "::error::Digest mismatch! action.yaml has ${ACTUAL_DIGEST} but expected ${DIGEST}. Was the digest update PR merged?"
            exit 1
          fi

          echo "Releasing ${VERSION} (digest verified: ${DIGEST})"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ inputs.digest }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          COMMIT_SHA=$(git rev-parse HEAD)

          git tag "${VERSION}"
          git push origin "${VERSION}"

          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "${VERSION}" \
            --notes "Container digest: \`${DIGEST}\`

          **Usage (pin by commit SHA):**
          \`\`\`yaml
          - uses: tinfoilsh/measure-image-action@${COMMIT_SHA}  # ${VERSION}
          \`\`\`"

      - name: Update README with pinned SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          BRANCH="readme-update/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "${BRANCH}"

          sed -i -E "s|measure-image-action@[a-f0-9]{40}[^\"]*|measure-image-action@${COMMIT_SHA}  # ${VERSION}|g" README.md

          if git diff --quiet README.md; then
            echo "README already up to date"
            exit 0
          fi

          git add README.md
          git commit -m "chore: update action in README to ${VERSION} (${COMMIT_SHA})"
          git push -f origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --title "chore: update action in README to ${VERSION}" \
            --body "Automated update of the pinned commit SHA in README.md after release ${VERSION}." \
            --base main \
            --head "${BRANCH}")

          echo "PR created: ${PR_URL}"

          gh pr merge "${PR_URL}" --rebase --delete-branch || \
            gh pr merge "${PR_URL}" --auto --rebase --delete-branch || \
            echo "::warning::Could not auto-merge README update PR. Merge it manually: ${PR_URL}"
